name: Utility
version: '1.7.2'
main: fun.derjxnnik.utility.Utility
api-version: '1.21.10'
softdepend:
  - HeadDatabase
  - LuckPerms


commands:
  bp:
    description: Open your backpack or others'
    usage: /bp
    permission: utility.backpack
    aliases: [backpack]

  ping:
    description: Show your current ping
    usage: /ping
    permission: utility.ping
    aliases: [ms, amilagging]

  ec:
    description: Open your Ender Chest
    usage: /ec
    permission: utility.enderchest
    aliases: [enderchest]

  rename:
    description: Rename the item in your hand
    usage: /rename <Item_Name>
    permission: utility.rename

  craft:
    description: Open a crafting table
    usage: /craft
    permission: utility.craftingtable
    aliases: [craftingtable, workbench, cr, werkbank]

  hat:
    description: Wear the item in your hand as a hat
    usage: /hat
    permission: utility.hat

  uuid:
    description: Show a player's UUID
    usage: /uuid <player>
    permission: utility.uuid
    aliases: [uniqueid]

  lastdeath:
    description: Show your last death location and cause
    usage: /lastdeath
    permission: utility.lastdeath
    aliases: [death, deathcause]

  spawn:
    description: Teleport to the world spawn
    usage: /spawn
    permission: utility.spawn

  setspawn:
    description: Set the world spawn to your location
    usage: /setspawn
    permission: utility.setspawn

  playtime:
    description: Show your total playtime
    usage: /playtime
    permission: utility.playtime
    aliases: [pt, spielzeit, sz]
  day:
    description: Show the current day
    usage: /day
    permission: utility.day
    aliases: [currentday]
  invsee:
    description: Open a players inventory
    usage: /invsee <player>
    permission: utility.invsee
    aliases: [inventory, inventorysee, openinv, openinventory]
  home:
    description: Open the HomeGUI
    usage: /home
    permission: utility.home
    aliases: [waypoints, wegpunkt]
  head:
    description: Opens the head menu or gives a player's head.
    usage: /head [player]
  tpa:
    description: Send a teleport request to another player
  tpaccept:
    description: Accept a pending teleport request
  tpdeny:
    description: Deny a pending teleport request
  utility:
    description: Main Utility command
    usage: /utility reload
    aliases: [util]
  settings:
    description: Open the Settings Menu
    usage: /settings
    aliases: [options, configure]
  info:
    description: Spielerinfo anzeigen
    usage: /info <Spieler>
    aliases: [playerinfo, spielerinfo]

  help:
    description: Zeigt alle verfügbaren Befehle an
    usage: /help
    aliases: [hilfe, befehle, commands]

  bugreport:
    description: Create a bugreport
    aliases: [bug, ifoundabug]
  color:
    description: Show available chat colors and formatting
    usage: /color
    permission: utility.chat.use

  container:
    description: Lock a container

  coins:
    description: Zeigt den Kontostand an
    usage: /coins [Spieler]
    aliases: [balance, bal, guthaben]

  pay:
    description: Coins an einen Spieler überweisen
    usage: /pay <Spieler> <Betrag>
    aliases: [transfer, überweisen]

  payments:
    description: Zahlungshistorie anzeigen
    usage: /payments
    aliases: [transaktionen, transactions]

  msg:
    description: Private Nachricht an einen Spieler senden
    usage: /msg <Spieler> <Nachricht>
    aliases: [whisper, w, tell, dm]

  r:
    description: Auf die letzte private Nachricht antworten
    usage: /r <Nachricht>
    aliases: [reply, antworten]

  ban:
    description: Einen Spieler bannen
    usage: /ban <Spieler> <Grund> [Zeit]
    permission: utility.ban

  unban:
    description: Einen Spieler entbannen
    usage: /unban <Spieler>
    permission: utility.ban

  mute:
    description: Einen Spieler stummschalten
    usage: /mute <Spieler> <Grund> <Zeit>
    permission: utility.mute

  unmute:
    description: Stummschaltung eines Spielers aufheben
    usage: /unmute <Spieler>
    permission: utility.mute

  discord:
    description: Discord-Link anzeigen
    usage: /discord
    aliases: [dc, staytuned, ]

  website:
    description: Website-Link anzeigen
    usage: /website
    aliases: [web]

  twitch:
    description: Twitch/Bewerber-Link anzeigen
    usage: /twitch
    aliases: [streamer]

permissions:
  utility.ban:
    description: Spieler bannen und entbannen (permanent + unbegrenzte Zeit)
    default: op

  utility.ban.limited:
    description: Spieler bannen – maximal 7 Tage, kein Permanent-Ban
    default: op

  utility.mute:
    description: Spieler stummschalten und entstummen
    default: op

  utility.coins.others:
    description: Kontostand anderer Spieler immer sehen (ignoriert Privat-Einstellung)
    default: op

  utility.help.staff:
    description: Zeigt Team-Befehle in /help an
    default: op

  utility.info.bypass:
    description: /info auch bei Spielern mit privat-Profil nutzen
    default: op

  utility.chat.use:
    description: Access to /color command
    default: true

  utility.chat.color.*:
    description: Use all chat colors
    default: op
    children:
      utility.chat.color.black: true
      utility.chat.color.dark_blue: true
      utility.chat.color.dark_green: true
      utility.chat.color.dark_aqua: true
      utility.chat.color.dark_red: true
      utility.chat.color.dark_purple: true
      utility.chat.color.gold: true
      utility.chat.color.gray: true
      utility.chat.color.dark_gray: true
      utility.chat.color.blue: true
      utility.chat.color.green: true
      utility.chat.color.aqua: true
      utility.chat.color.red: true
      utility.chat.color.light_purple: true
      utility.chat.color.yellow: true
      utility.chat.color.white: true

  utility.chat.color.black:
    description: Use black in chat
    default: op
  utility.chat.color.dark_blue:
    description: Use dark blue in chat
    default: op
  utility.chat.color.dark_green:
    description: Use dark green in chat
    default: op
  utility.chat.color.dark_aqua:
    description: Use dark aqua in chat
    default: op
  utility.chat.color.dark_red:
    description: Use dark red in chat
    default: op
  utility.chat.color.dark_purple:
    description: Use dark purple in chat
    default: op
  utility.chat.color.gold:
    description: Use gold in chat
    default: op
  utility.chat.color.gray:
    description: Use gray in chat
    default: op
  utility.chat.color.dark_gray:
    description: Use dark gray in chat
    default: op
  utility.chat.color.blue:
    description: Use blue in chat
    default: op
  utility.chat.color.green:
    description: Use green in chat
    default: op
  utility.chat.color.aqua:
    description: Use aqua in chat
    default: op
  utility.chat.color.red:
    description: Use red in chat
    default: op
  utility.chat.color.light_purple:
    description: Use light purple in chat
    default: op
  utility.chat.color.yellow:
    description: Use yellow in chat
    default: op
  utility.chat.color.white:
    description: Use white in chat
    default: op

  utility.chat.format.*:
    description: Use all chat formatting
    default: op
    children:
      utility.chat.format.bold: true
      utility.chat.format.italic: true
      utility.chat.format.underline: true
      utility.chat.format.obfuscated: true
      utility.chat.format.strikethrough: true

  utility.chat.format.bold:
    description: Use bold in chat
    default: op
  utility.chat.format.italic:
    description: Use italic in chat
    default: op
  utility.chat.format.underline:
    description: Use underline in chat
    default: op
  utility.chat.format.obfuscated:
    description: Use obfuscated in chat
    default: op
  utility.chat.format.strikethrough:
    description: Use strikethrough in chat
    default: op