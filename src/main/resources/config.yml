resource-pack:
  enabled: true
  # Public IP of your server (e.g. "123.45.67.89")
  server-ip: ""
  # Port the resource pack is served on (must be open in your firewall)
  port: 8080
  # Message shown to players in the download dialog
  prompt: "Bitte akzeptiere das Resource Pack!"

backpack:
  # Default slot count (used when no matching rank is found)
  slots: 9
  allow-shulkers: false
  allow-admin-edit: true
  # Slots per rank (LuckPerms group name, lowercase). -1 = disabled for this rank.
  rank-slots:
    admin: 54
    moderator: 54
    helper: 27
    famous: 54
    streamer: 27
    vip: 27
    subscriber: 18
    default: 9

homes:
  # Default limit (used when no matching rank is found)
  max-homes: 3
  # Limit per rank. -1 = unlimited.
  rank-homes:
    admin: -1
    moderator: -1
    helper: -1
    famous: 10
    streamer: 7
    vip: 5
    subscriber: 4
    default: 3

tpa:
  delay-seconds: 3
  expire-seconds: 60
  show-particles: true

server:
  name: "SMP.DerJxnnik.FUN"
  website: "DerJxnnik.fun"

ranks:
  enabled: true
  show-in-tab: true
  show-in-chat: true
  show-in-scoreboard: true
  show-in-nametag: true
  # Placeholders: {prefix} {name}
  tab-format: "{prefix} | {name}"
  # Placeholders: {prefix} {name} — message is appended automatically
  chat-format: "{prefix} | {name}"
  scoreboard-label: "Rang"
  # Gradient per rank (key = LuckPerms group name, lowercase)
  # "default" is used when no matching rank is found
  gradients:
    admin:
      colors: ["#FF2222", "#880000"]
    moderator:
      colors: ["#55FF55", "#00AA00"]
    helper:
      colors: ["#4488FF", "#0033AA"]
    famous:
      colors: ["#FF00FF", "#BB00FF"]
    streamer:
      colors: ["#AA44FF", "#FF44BB"]
    vip:
      colors: ["#FFD700", "#FFC107"]
    subscriber:
      colors: ["#00BCD4", "#0097A7"]
    default:
      colors: ["#AAAAAA", "#FFFFFF"]

scoreboard:
  # Header displayed at the top of the sidebar (always in small_caps font).
  header:
    text: "dasumc.de"
    gradient:
      - "#FF44FF"
      - "#AA00CC"

  # Set to true only when using the DASUMC resource pack (enables PUA icon characters
  # before stat values). Public/standalone installs should keep this false.
  use-textures: false

  # Color for labels (e.g. "rang:", "coins:"). Hex only.
  label-color: "#777777"

  # Colors for resolved variable values. Use a list of 2+ hex colors for a gradient,
  # or "auto" to use automatic coloring (rank uses LuckPerms prefix, ping uses speed-color).
  # Lines starting with < are parsed as raw MiniMessage and ignore these settings.
  value-colors:
    rank: "auto"
    coins:
      - "#FFD700"
      - "#FFB300"
    kills:
      - "#FF6464"
      - "#CC0000"
    deaths:
      - "#FF6464"
      - "#CC0000"
    spielzeit:
      - "#64B5F6"
      - "#1565C0"
    ping: "auto"
    online:
      - "#69F0AE"
      - "#00C853"

  # Lines listed top -> bottom.
  # Supported variables: %rank% %coins% %kills% %deaths% %spielzeit% %ping% %online% %maxplayers%
  # Lines starting with < are treated as raw MiniMessage (full control, no auto-formatting).
  lines:
    - ""
    - "rang:"
    - "%rank%"
    - ""
    - "coins:"
    - "%coins%"
    - ""
    - "kills:"
    - "%kills%"
    - ""
    - "tode:"
    - "%deaths%"
    - ""
    - "clan:"
    - "kommt bald!"
    - ""
    - "spielzeit:"
    - "%spielzeit%"
    - ""
    - "online:"
    - "%online%/%maxplayers%"

use-command:
  bp: true
  craft: true
  day: true
  ec: true
  home: true
  head: true
  hat: true
  info: true
  invsee: true
  lastdeath: true
  ping: true
  playtime: true
  rename: true
  spawn: true
  tpa: true
  uuid: true
