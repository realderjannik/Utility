resource-pack:
  enabled: true
  # Öffentliche IP deines Servers (z.B. "123.45.67.89")
  server-ip: ""
  # Port auf dem das Pack ausgeliefert wird (muss in der Firewall offen sein)
  port: 8080
  # Nachricht die Spielern beim Download-Dialog angezeigt wird
  prompt: "Bitte akzeptiere das Resource Pack!"

backpack:
  slots: 54
  allow-shulkers: false
  allow-admin-edit: true

homes:
  max-homes: 5

tpa:
  delay-seconds: 3
  expire-seconds: 60
  show-particles: true

server:
  name: "SMP.DerJxnnik.FUN"
  website: "DerJxnnik.fun"

ranks:
  enabled: true
  show-in-tab: true
  show-in-chat: true
  show-in-scoreboard: true
  show-in-nametag: true
  # Placeholders: {prefix} {name}
  tab-format: "{prefix} | {name}"
  # Placeholders: {prefix} {name} — message is appended automatically
  chat-format: "{prefix} | {name}"
  scoreboard-label: "Rang"
  # Farbverlauf pro Rang (Key = LuckPerms Gruppenname, lowercase)
  # "default" wird verwendet wenn kein passender Rang gefunden wird
  gradients:
    admin:
      colors: ["#FF4444", "#AA0000"]
    a-moderator:
      colors: ["#FF8800", "#FF4400"]
    d-moderator:
      colors: ["#FFD700", "#FFA500"]
    streamer:
      colors: ["#9B59B6", "#E91E8C"]
    a-vip:
      colors: ["#FFD700", "#FFC107"]
    d-vip:
      colors: ["#ADFF2F", "#7CFC00"]
    a-subscriber:
      colors: ["#00BCD4", "#0097A7"]
    d-subscriber:
      colors: ["#64B5F6", "#1976D2"]
    default:
      colors: ["#AAAAAA", "#FFFFFF"]

use-command:
  bp: true
  craft: true
  day: true
  ec: true
  home: true
  head: true
  hat: true
  info: true
  invsee: true
  lastdeath: true
  ping: true
  playtime: true
  rename: true
  spawn: true
  tpa: true
  uuid: true
